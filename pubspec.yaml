name: touch
description: An offline-first mesh chat application using NFC for key exchange.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  nearby_connections: ^4.3.0
  nfc_manager: ^3.3.0
  permission_handler: ^11.0.0
  provider: ^6.1.1

  cryptography: ^2.7.0

  intl: ^0.19.0
  uuid: ^4.0.0

  google_fonts: ^6.1.0
  flutter_nfc_hce: ^0.1.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
